name: ana_app
description: AnaApp - Flashcards inteligentes com IA
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Secure storage (API key)
  flutter_secure_storage: ^9.2.2

  # HTTP
  http: ^1.2.1

  # PDF
  syncfusion_flutter_pdf: ^26.2.14
  file_picker: ^8.1.2

  # Dynamic Color (Material You)
  dynamic_color: ^1.7.0

  # Charts
  fl_chart: ^0.68.0

  # Export/Import
  share_plus: ^10.0.0
  path_provider: ^2.1.3

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.4.2

  # Image picker
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/AnaAppIcon.png"
